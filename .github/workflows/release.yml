name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # gh release create
  id-token: write        # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff needs full history for section extraction
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: sudo apt-get update && sudo apt-get install -y tmux jq fzf
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm pack --dry-run
      - run: npm publish --access public --provenance
      # Extract this tag's section from CHANGELOG.md as release notes.
      # The awk starts at `## [X.Y.Z]` and stops at the next `## [` header.
      - name: Extract release notes
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          {
            echo 'body<<EOF'
            awk -v v="$version" '
              $0 ~ "^## \\[" v "\\]" { taking=1; print; next }
              taking && $0 ~ "^## \\[" { exit }
              taking { print }
            ' CHANGELOG.md
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.notes.outputs.body }}"
