name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # gh release create
  id-token: write        # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # git-cliff needs full history for section extraction
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Trust the PR-time gate for correctness — release only enforces build
      # + tarball sanity + publish. Re-running full test/contract.sh here
      # would just extend the release window without adding signal.
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
      # npm Trusted Publishing (OIDC): id-token: write above lets npm publish
      # authenticate directly via the GitHub Actions OIDC token — no
      # NPM_TOKEN secret, no NODE_AUTH_TOKEN env, no registry-url. Provenance
      # is signed automatically. Configured at:
      # npmjs.com → @jaggerxtrm/xtmux → Settings → Publishing → GitHub Actions.
      - run: npm publish --access public --provenance
      # GH Release creation is owned by the release driver (xtrm-release
      # workflow → release_execute.py runs `gh release create` before pushing
      # the tag that triggers this workflow). Duplicating it here would
      # 422 every time. If cutting a tag manually without the driver, create
      # the GH Release by hand with `gh release create vX.Y.Z --notes ...`.
