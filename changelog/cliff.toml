[changelog]
header = """
# Changelog

All notable changes to this project are documented here.

"""
body = """
{% if version %}## [{{ version | trim_start_matches(pat=\"v\") }}] - {{ timestamp | date(format=\"%Y-%m-%d\") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute=\"group\") %}
### {{ group | striptags | trim }}
{% for commit in commits %}- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end=\"\") }}](https://github.com/Jaggerxtrm/xtmux/commit/{{ commit.id }}))
{% endfor %}{% endfor %}
"""
trim = true
footer = """
<!-- generated by xtmux-changelog; edit commit messages or cliff.toml, not generated rows -->
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  # Meta-refresh commits stay out of the changelog they just regenerated,
  # otherwise every regen triggers another regen (chase-tail).
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^feat\\(obs\\)", group = "Observability runtime" },
  { message = "^(feat|fix)\\(coordination\\)", group = "Coordination and hooks" },
  { message = "^(feat|fix)\\(messages\\)", group = "Messages and delivery" },
  { message = "^(feat|fix)\\(migration\\)", group = "Migration" },
  { message = "^(feat|fix)\\(pi\\)", group = "Pi extensions" },
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^(docs|chore|build|ci|test|refactor|style)(\\(meta\\))?", group = "Project maintenance" },
  { message = ".*", group = "Other changes" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
